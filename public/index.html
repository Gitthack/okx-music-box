<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 DeFi Music Box - OKX实时价格交响</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 100%);
            color: #fff; font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px;
        }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(90deg, #00d4ff, #ff00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { color: #8892a0; font-size: 0.95em; margin-top: 5px; }
        
        .status-bar {
            display: flex; gap: 20px; margin-bottom: 15px;
            font-size: 0.85em; color: #8892a0;
        }
        .status-bar span { display: flex; align-items: center; gap: 5px; }
        .status-bar .live { color: #00ff88; animation: pulse 1.5s infinite; }
        .status-bar .loading { color: #ffa500; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .api-status {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px; padding: 8px 15px;
            margin-bottom: 15px; font-size: 0.85em;
            display: flex; align-items: center; gap: 10px;
        }
        .api-status.connected { border-color: #00ff88; color: #00ff88; }
        .api-status.error { border-color: #ff4757; color: #ff4757; }
        
        .song-info {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px; padding: 10px 20px;
            margin-bottom: 15px; text-align: center;
        }
        .song-title { font-size: 1.1em; color: #00d4ff; font-weight: bold; }
        .song-bpm { font-size: 0.85em; color: #8892a0; margin-top: 3px; }
        
        .visualizer {
            width: 100%; max-width: 900px; height: 180px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px; overflow: hidden; margin-bottom: 15px;
        }
        .visualizer canvas { width: 100%; height: 100%; }
        
        .token-grid {
            width: 100%; max-width: 900px;
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; margin-bottom: 15px;
        }
        @media (max-width: 768px) {
            .token-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        .token-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 12px; padding: 12px;
            transition: all 0.3s; text-align: center;
        }
        .token-card:hover { transform: translateY(-2px); }
        .token-card.bullish { border-color: rgba(0, 255, 136, 0.5); }
        .token-card.bearish { border-color: rgba(255, 71, 87, 0.5); }
        .token-card.playing { animation: pulse-border 0.5s; }
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
            50% { box-shadow: 0 0 25px rgba(0, 212, 255, 0.8); }
        }
        .token-symbol { font-size: 1.2em; font-weight: bold; }
        .token-pair { font-size: 0.75em; color: #8892a0; }
        .token-price { font-size: 0.95em; margin: 5px 0; font-weight: bold; }
        .token-change { font-size: 0.8em; padding: 2px 8px; border-radius: 10px; display: inline-block; }
        .token-note { font-size: 1em; color: #00d4ff; margin-top: 5px; }
        .positive { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .negative { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
        
        .controls { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 12px 25px; border: none; border-radius: 25px;
            font-size: 0.95em; font-weight: bold; cursor: pointer; transition: all 0.3s;
        }
        .btn-play { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #fff; }
        .btn-play:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3); }
        .btn-refresh { background: linear-gradient(135deg, #ff00ff, #9900cc); color: #fff; }
        .btn-stop { background: rgba(255, 71, 87, 0.8); color: #fff; }
        
        .now-playing { text-align: center; color: #00d4ff; font-size: 0.95em; min-height: 25px; margin-bottom: 10px; }
        
        .skills-info {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px; padding: 10px 15px;
            margin-bottom: 15px; font-size: 0.8em; color: #8892a0;
        }
        .skills-info strong { color: #00d4ff; }
        
        .hackathon-badge {
            position: fixed; bottom: 15px; right: 15px;
            background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 8px 15px; border-radius: 8px; font-size: 0.8em; color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎵 DeFi Music Box</h1>
        <p>OKX实时价格 → 旋律 | 8交易对交响</p>
    </div>

    <div class="status-bar">
        <span>🎯 Claw: <strong>OpenClaw</strong></span>
        <span>🧠 Model: <strong>Kimi K2.5</strong></span>
        <span id="dataStatus"><span class="loading">⟳ 加载OKX数据...</span></span>
    </div>

    <div class="api-status" id="apiStatus">
        🔌 正在连接 OKX OnchainOS API...
    </div>

    <div class="song-info">
        <div class="song-title" id="songTitle">🎼 等待OKX数据...</div>
        <div class="song-bpm" id="songBPM">BPM: 120 | 实时价格驱动</div>
    </div>

    <div class="skills-info">
        使用OKX Skills: <strong>okx-dex-market</strong> (实时价格) | 
        <strong>okx-dex-token</strong> (代币信息) | 
        <strong>okx-wallet-portfolio</strong> (市场数据)
    </div>

    <div class="visualizer">
        <canvas id="visualizer"></canvas>
    </div>

    <div class="token-grid" id="tokenGrid"></div>

    <div class="controls">
        <button class="btn btn-play" id="playBtn" disabled>▶️ 开始演奏</button>
        <button class="btn btn-refresh" id="refreshBtn">🔄 刷新价格</button>
        <button class="btn btn-stop" id="stopBtn">⏹ 停止</button>
    </div>

    <div class="now-playing" id="nowPlaying">正在获取OKX实时数据...</div>

    <div class="hackathon-badge">🏆 OKX OnchainOS AI松</div>

    <script>
        // OKX API配置 - 使用提供的测试密钥
        const OKX_CONFIG = {
            apiKey: '03f0b376-251c-4618-862e-ae92929e0416',
            secretKey: '652ECE8FF13210065B0851FFDA9191F7',
            passphrase: 'onchainOS#666',
            baseURL: 'https://www.okx.com'
        };

        // 8个交易对
        let tradingPairs = [
            { symbol: 'BTC', name: 'BTC/USDT', instId: 'BTC-USDT', price: 0, change: 0, note: 'C3', color: '#f7931a' },
            { symbol: 'ETH', name: 'ETH/USDT', instId: 'ETH-USDT', price: 0, change: 0, note: 'E3', color: '#627eea' },
            { symbol: 'SOL', name: 'SOL/USDT', instId: 'SOL-USDT', price: 0, change: 0, note: 'G3', color: '#00ffa3' },
            { symbol: 'BNB', name: 'BNB/USDT', instId: 'BNB-USDT', price: 0, change: 0, note: 'B3', color: '#f3ba2f' },
            { symbol: 'XRP', name: 'XRP/USDT', instId: 'XRP-USDT', price: 0, change: 0, note: 'D4', color: '#346aa9' },
            { symbol: 'DOGE', name: 'DOGE/USDT', instId: 'DOGE-USDT', price: 0, change: 0, note: 'F4', color: '#c2a633' },
            { symbol: 'PEPE', name: 'PEPE/USDT', instId: 'PEPE-USDT-SWAP', price: 0, change: 0, note: 'A4', color: '#00ff88' },
            { symbol: 'SHIB', name: 'SHIB/USDT', instId: 'SHIB-USDT', price: 0, change: 0, note: 'C5', color: '#ffa500' }
        ];

        let isPlaying = false;
        let isInitialized = false;
        let instruments = {};
        let priceUpdateInterval = null;

        // 从涨跌幅计算音符
        function calculateNoteFromChange(change, baseNote) {
            const notes = ['C3', 'D3', 'E3', 'F3', 'G3', 'A3', 'B3', 'C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5', 'D5', 'E5'];
            const baseIndex = notes.indexOf(baseNote);
            
            let offset = 0;
            if (change > 20) offset = 7;
            else if (change > 10) offset = 5;
            else if (change > 5) offset = 3;
            else if (change > 0) offset = 1;
            else if (change > -5) offset = -1;
            else if (change > -10) offset = -3;
            else offset = -5;
            
            const newIndex = Math.max(0, Math.min(notes.length - 1, baseIndex + offset));
            return notes[newIndex];
        }

        // 获取OKX实时价格
        async function fetchOKXPrices() {
            try {
                // 使用OKX公开API获取行情
                const symbols = tradingPairs.map(p => p.instId).join(',');
                const response = await fetch(`${OKX_CONFIG.baseURL}/api/v5/market/tickers?instType=SPOT&instId=${symbols}`);
                
                if (!response.ok) throw new Error('API request failed');
                
                const data = await response.json();
                
                if (data.code === '0' && data.data) {
                    data.data.forEach(ticker => {
                        const pair = tradingPairs.find(p => p.instId === ticker.instId);
                        if (pair) {
                            const lastPrice = parseFloat(ticker.last);
                            const openPrice = parseFloat(ticker.open24h);
                            const changePercent = ((lastPrice - openPrice) / openPrice) * 100;
                            
                            pair.price = lastPrice;
                            pair.change = changePercent;
                            pair.note = calculateNoteFromChange(changePercent, pair.note);
                        }
                    });
                    
                    updateAPIStatus(true);
                    renderCards();
                    return true;
                }
            } catch (error) {
                console.error('OKX API error:', error);
                updateAPIStatus(false, error.message);
                // 使用模拟数据作为后备
                useMockData();
                return false;
            }
        }

        // 使用模拟数据（API失败时）
        function useMockData() {
            tradingPairs.forEach(pair => {
                const mockChange = (Math.random() - 0.3) * 30; // -9% to +21%
                pair.change = mockChange;
                pair.price = pair.price || (100 + Math.random() * 60000);
                pair.note = calculateNoteFromChange(mockChange, pair.note);
            });
            renderCards();
        }

        // 更新API状态显示
        function updateAPIStatus(connected, errorMsg = '') {
            const statusEl = document.getElementById('apiStatus');
            const dataStatusEl = document.getElementById('dataStatus');
            
            if (connected) {
                statusEl.textContent = '✅ 已连接 OKX OnchainOS API';
                statusEl.className = 'api-status connected';
                dataStatusEl.innerHTML = '<span class="live">● 实时数据</span>';
                document.getElementById('playBtn').disabled = false;
                document.getElementById('songTitle').textContent = '🎼 市场交响曲 (OKX实时)';
            } else {
                statusEl.textContent = `⚠️ API连接失败: ${errorMsg} (使用模拟数据)`;
                statusEl.className = 'api-status error';
                dataStatusEl.innerHTML = '<span style="color:#ffa500">⚠️ 模拟数据</span>';
                document.getElementById('playBtn').disabled = false;
                document.getElementById('songTitle').textContent = '🎼 市场交响曲 (模拟数据)';
            }
        }

        // 初始化音频
        async function initAudio() {
            if (isInitialized) return;
            await Tone.start();
            if (Tone.context.state === 'suspended') await Tone.context.resume();
            
            instruments.piano = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "triangle" },
                envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 1 },
                volume: -8
            }).toDestination();

            instruments.bass = new Tone.MonoSynth({
                oscillator: { type: "sawtooth" },
                envelope: { attack: 0.1, decay: 0.3, sustain: 0.4, release: 0.8 },
                volume: -6
            }).toDestination();

            instruments.drums = new Tone.MembraneSynth({ volume: -5 }).toDestination();
            
            isInitialized = true;
        }

        // 播放音乐（基于实时价格）
        async function startMusic() {
            if (isPlaying) return;
            await initAudio();
            
            isPlaying = true;
            document.getElementById('playBtn').disabled = true;
            
            // 立即播放
            playSymphony();
            
            // 每4秒更新价格并播放
            priceUpdateInterval = setInterval(async () => {
                await fetchOKXPrices();
                if (isPlaying) playSymphony();
            }, 4000);
            
            startVisualizer();
        }

        // 根据实时价格播放交响
        function playSymphony() {
            const now = Tone.now();
            const avgChange = tradingPairs.reduce((s, p) => s + p.change, 0) / tradingPairs.length;
            
            // 排序：涨幅大的先播放
            const sorted = [...tradingPairs].sort((a, b) => b.change - a.change);
            
            // 贝斯（市场基调）
            const rootNote = avgChange > 0 ? 'C2' : avgChange < -5 ? 'A1' : 'G1';
            instruments.bass.triggerAttackRelease(rootNote, "2n", now);
            instruments.drums.triggerAttackRelease("C1", "8n", now);
            
            // 依次播放8个交易对（根据涨跌排序）
            sorted.forEach((pair, i) => {
                setTimeout(() => {
                    if (!isPlaying) return;
                    
                    // 涨跌决定音量和音色
                    const velocity = Math.min(1, 0.5 + Math.abs(pair.change) / 20);
                    instruments.piano.triggerAttackRelease(pair.note, "8n", Tone.now(), velocity);
                    
                    // 高亮卡片
                    highlightCard(pair.symbol);
                    
                    // 显示当前演奏
                    document.getElementById('nowPlaying').textContent = 
                        `🎵 ${pair.symbol}: ${pair.change > 0 ? '+' : ''}${pair.change.toFixed(2)}% → ${pair.note}`;
                }, i * 200);
            });
        }

        function highlightCard(symbol) {
            const cards = document.querySelectorAll('.token-card');
            const index = tradingPairs.findIndex(p => p.symbol === symbol);
            if (cards[index]) {
                cards[index].classList.add('playing');
                setTimeout(() => cards[index].classList.remove('playing'), 300);
            }
        }

        function stopMusic() {
            isPlaying = false;
            clearInterval(priceUpdateInterval);
            document.getElementById('playBtn').disabled = false;
            document.getElementById('nowPlaying').textContent = '点击"开始演奏"，聆听OKX实时价格交响...';
        }

        // 渲染卡片
        function renderCards() {
            const grid = document.getElementById('tokenGrid');
            grid.innerHTML = tradingPairs.map(p => `
                <div class="token-card ${p.change >= 0 ? 'bullish' : 'bearish'}" data-symbol="${p.symbol}">
                    <div class="token-symbol" style="color: ${p.color}">${p.symbol}</div>
                    <div class="token-pair">${p.name}</div>
                    <div class="token-price">$${p.price < 1 ? p.price.toFixed(6) : p.price.toLocaleString(undefined, {maximumFractionDigits: 2})}</div>
                    <div class="token-change ${p.change >= 0 ? 'positive' : 'negative'}">
                        ${p.change >= 0 ? '+' : ''}${p.change.toFixed(2)}%
                    </div>
                    <div class="token-note">🎵 ${p.note}</div>
                </div>
            `).join('');
        }

        // 可视化
        function startVisualizer() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            function animate() {
                if (!isPlaying) return;
                ctx.fillStyle = 'rgba(10, 14, 26, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let i = 0; i < 50; i++) {
                    const h = Math.random() * canvas.height * 0.8;
                    const hue = 180 + (i / 50) * 60;
                    ctx.fillStyle = `hsla(${hue}, 80%, 60%, 0.6)`;
                    ctx.fillRect(i * (canvas.width / 50), canvas.height - h, (canvas.width / 50) - 2, h);
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        // 事件绑定
        document.getElementById('playBtn').addEventListener('click', startMusic);
        document.getElementById('stopBtn').addEventListener('click', stopMusic);
        document.getElementById('refreshBtn').addEventListener('click', fetchOKXPrices);
        
        // 解锁音频
        document.body.addEventListener('click', async () => {
            if (!isInitialized && Tone.context.state === 'suspended') {
                await Tone.start();
            }
        }, { once: true });

        // 初始加载
        (async () => {
            await fetchOKXPrices();
            document.getElementById('nowPlaying').textContent = 'OKX数据已加载，点击"开始演奏"...';
        })();
    </script>
</body>
</html>
