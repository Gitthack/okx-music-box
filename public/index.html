<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 DeFi Music Box - 8交易对实时交响</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 100%);
            color: #fff; font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 20px;
        }
        .header { text-align: center; margin-bottom: 15px; }
        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(90deg, #00d4ff, #ff00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { color: #8892a0; font-size: 1em; margin-top: 5px; }
        
        .song-info {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            padding: 10px 20px;
            margin-bottom: 15px;
            text-align: center;
        }
        .song-title { font-size: 1.1em; color: #00d4ff; font-weight: bold; }
        .song-bpm { font-size: 0.9em; color: #8892a0; margin-top: 3px; }
        
        .visualizer {
            width: 100%; max-width: 900px; height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px; overflow: hidden; margin-bottom: 15px;
        }
        .visualizer canvas { width: 100%; height: 100%; }
        
        .token-grid {
            width: 100%; max-width: 900px;
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; margin-bottom: 15px;
        }
        @media (max-width: 768px) {
            .token-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        .token-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 12px; padding: 12px;
            transition: all 0.3s; text-align: center;
        }
        .token-card:hover { transform: translateY(-2px); }
        .token-card.bullish { border-color: rgba(0, 255, 136, 0.5); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        .token-card.bearish { border-color: rgba(255, 71, 87, 0.5); box-shadow: 0 0 10px rgba(255, 71, 87, 0.2); }
        .token-card.playing { animation: pulse-border 0.5s; }
        
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(0, 212, 255, 0.5); }
            50% { border-color: rgba(0, 212, 255, 1); box-shadow: 0 0 20px rgba(0, 212, 255, 0.5); }
        }
        
        .token-symbol { font-size: 1.3em; font-weight: bold; }
        .token-price { font-size: 0.95em; margin: 5px 0; }
        .token-change { font-size: 0.85em; padding: 2px 8px; border-radius: 10px; display: inline-block; }
        .token-note { font-size: 1.1em; color: #00d4ff; margin-top: 5px; }
        .positive { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .negative { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
        
        .controls {
            display: flex; gap: 15px; margin-bottom: 15px;
        }
        .btn {
            padding: 12px 30px; border: none; border-radius: 25px;
            font-size: 1em; font-weight: bold; cursor: pointer;
            transition: all 0.3s;
        }
        .btn-play { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #fff; }
        .btn-play:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3); }
        .btn-stop { background: rgba(255, 71, 87, 0.8); color: #fff; }
        
        .now-playing {
            text-align: center; color: #00d4ff; font-size: 1em;
            min-height: 25px; margin-bottom: 10px;
        }
        
        .legend {
            display: flex; gap: 20px; font-size: 0.85em; color: #8892a0;
            margin-bottom: 10px;
        }
        .legend span { display: flex; align-items: center; gap: 5px; }
        
        .hackathon-badge {
            position: fixed; bottom: 15px; right: 15px;
            background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 8px 15px; border-radius: 8px; font-size: 0.8em; color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎵 DeFi Music Box</h1>
        <p>8交易对实时价格交响 | OKX OnchainOS Hackathon</p>
    </div>

    <div class="song-info">
        <div class="song-title" id="songTitle">🎼 市场交响曲</div>
        <div class="song-bpm" id="songBPM">BPM: 120 | 调性: C大调</div>
    </div>

    <div class="legend">
        <span>🎹 钢琴 - BTC/ETH</span>
        <span>🎸 吉他 - SOL/PEPE</span>
        <span>🎺 小号 - BNB/XRP</span>
        <span>🥁 鼓点 - DOGE/SHIB</span>
    </div>

    <div class="visualizer">
        <canvas id="visualizer"></canvas>
    </div>

    <div class="token-grid" id="tokenGrid"></div>

    <div class="controls">
        <button class="btn btn-play" id="playBtn">▶️ 开始演奏</button>
        <button class="btn btn-stop" id="stopBtn">⏹ 停止</button>
    </div>

    <div class="now-playing" id="nowPlaying">点击"开始演奏"，聆听8交易对的实时交响...</div>

    <div class="hackathon-badge">🏆 OKX OnchainOS AI松 | k2p5 + Tone.js</div>

    <script>
        // 8个交易对配置
        const tradingPairs = [
            { symbol: 'BTC', name: 'BTC/USDT', price: 67234, change: 2.3, note: 'C4', instrument: 'piano', color: '#f7931a' },
            { symbol: 'ETH', name: 'ETH/USDT', price: 3456, change: 5.7, note: 'E4', instrument: 'piano', color: '#627eea' },
            { symbol: 'SOL', name: 'SOL/USDT', price: 145, change: 8.2, note: 'G4', instrument: 'guitar', color: '#00ffa3' },
            { symbol: 'BNB', name: 'BNB/USDT', price: 590, change: -1.2, note: 'B4', instrument: 'trumpet', color: '#f3ba2f' },
            { symbol: 'XRP', name: 'XRP/USDT', price: 0.62, change: 12.5, note: 'D5', instrument: 'trumpet', color: '#346aa9' },
            { symbol: 'DOGE', name: 'DOGE/USDT', price: 0.18, change: 15.8, note: 'F5', instrument: 'drums', color: '#c2a633' },
            { symbol: 'PEPE', name: 'PEPE/USDT', price: 0.000012, change: 25.3, note: 'A5', instrument: 'guitar', color: '#00ff88' },
            { symbol: 'SHIB', name: 'SHIB/USDT', price: 0.000028, change: -5.4, note: 'C6', instrument: 'drums', color: '#ffa500' }
        ];

        let isPlaying = false;
        let isInitialized = false;
        let loop = null;
        let animationId = null;
        let beat = 0;

        // 乐器
        let instruments = {};
        
        // 和弦进行（基于市场情绪）
        const chordProgressions = {
            bullish: [['C4', 'E4', 'G4'], ['F4', 'A4', 'C5'], ['G4', 'B4', 'D5'], ['C4', 'E4', 'G4']], // I-IV-V-I
            bearish: [['A3', 'C4', 'E4'], ['D4', 'F4', 'A4'], ['E4', 'G4', 'B4'], ['A3', 'C4', 'E4']], // vi-ii-iii-vi
            neutral: [['C4', 'E4', 'G4'], ['A3', 'C4', 'E4'], ['F4', 'A4', 'C5'], ['G4', 'B4', 'D5']] // I-vi-IV-V
        };

        // 初始化音频
        async function initAudio() {
            if (isInitialized) return;
            
            await Tone.start();
            if (Tone.context.state === 'suspended') {
                await Tone.context.resume();
            }

            // 钢琴 - 旋律
            instruments.piano = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "triangle" },
                envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 1 },
                volume: -8
            }).toDestination();

            // 吉他 - 和弦
            instruments.guitar = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "sawtooth" },
                envelope: { attack: 0.05, decay: 0.2, sustain: 0.4, release: 0.8 },
                volume: -10
            }).toDestination();

            // 小号 - 高潮
            instruments.trumpet = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "square" },
                envelope: { attack: 0.01, decay: 0.1, sustain: 0.2, release: 0.5 },
                volume: -12
            }).toDestination();

            // 鼓 - 节奏
            instruments.drums = new Tone.MembraneSynth({ volume: -5 }).toDestination();
            
            // 贝斯 - 低音
            instruments.bass = new Tone.MonoSynth({
                oscillator: { type: "sawtooth" },
                envelope: { attack: 0.1, decay: 0.3, sustain: 0.4, release: 0.8 },
                volume: -6
            }).toDestination();

            isInitialized = true;
        }

        // 计算当前市场情绪
        function getMarketSentiment() {
            const avgChange = tradingPairs.reduce((sum, p) => sum + p.change, 0) / tradingPairs.length;
            if (avgChange > 5) return 'bullish';
            if (avgChange < -3) return 'bearish';
            return 'neutral';
        }

        // 播放一小节（像一首歌）
        function playBar(barIndex) {
            const sentiment = getMarketSentiment();
            const chords = chordProgressions[sentiment];
            const chord = chords[barIndex % 4];
            const now = Tone.now();
            
            // 第1拍：贝斯 + 鼓
            instruments.bass.triggerAttackRelease(chord[0], "2n", now);
            instruments.drums.triggerAttackRelease("C2", "8n", now);
            
            // 第2拍：和弦
            setTimeout(() => {
                instruments.piano.triggerAttackRelease(chord, "4n");
            }, 250);
            
            // 第3拍：吉他琶音
            setTimeout(() => {
                chord.forEach((note, i) => {
                    instruments.guitar.triggerAttackRelease(note, "8n", now + 0.5 + i * 0.1);
                });
            }, 500);
            
            // 第4拍：根据涨跌最强代币播放高音
            setTimeout(() => {
                const leader = [...tradingPairs].sort((a, b) => Math.abs(b.change) - Math.abs(a.change))[0];
                const note = leader.change > 0 ? Tone.Frequency(leader.note).transpose(12) : leader.note;
                instruments.trumpet.triggerAttackRelease(note, "4n");
                highlightCard(leader.symbol);
            }, 750);
            
            // 更新视觉
            updatePlayingInfo(barIndex, sentiment);
        }

        // 高亮卡片
        function highlightCard(symbol) {
            const cards = document.querySelectorAll('.token-card');
            const index = tradingPairs.findIndex(p => p.symbol === symbol);
            if (cards[index]) {
                cards[index].classList.add('playing');
                setTimeout(() => cards[index].classList.remove('playing'), 500);
            }
        }

        // 更新播放信息
        function updatePlayingInfo(bar, sentiment) {
            const sentiments = { bullish: '牛市狂欢 🚀', bearish: '熊市低鸣 📉', neutral: '市场平衡 ⚖️' };
            const chordNames = ['C', 'F', 'G', 'Am'];
            document.getElementById('nowPlaying').textContent = 
                `🎵 第${bar + 1}小节 | ${sentiments[sentiment]} | 和弦: ${chordNames[bar % 4]}`;
        }

        // 开始播放
        async function startMusic() {
            if (isPlaying) return;
            await initAudio();
            
            isPlaying = true;
            beat = 0;
            document.getElementById('playBtn').disabled = true;
            
            Tone.Transport.bpm.value = 120;
            
            loop = new Tone.Loop((time) => {
                playBar(beat);
                beat++;
            }, "1n").start(0);
            
            Tone.Transport.start();
            startVisualizer();
            
            document.getElementById('songTitle').textContent = 
                getMarketSentiment() === 'bullish' ? '🚀 牛市狂欢曲' : 
                getMarketSentiment() === 'bearish' ? '📉 熊市沉思曲' : '⚖️ 市场平衡曲';
        }

        // 停止
        function stopMusic() {
            isPlaying = false;
            Tone.Transport.stop();
            if (loop) loop.stop();
            document.getElementById('playBtn').disabled = false;
            document.getElementById('nowPlaying').textContent = '点击"开始演奏"，聆听8交易对的实时交响...';
        }

        // 渲染卡片
        function renderCards() {
            const grid = document.getElementById('tokenGrid');
            grid.innerHTML = tradingPairs.map(p => `
                <div class="token-card ${p.change >= 0 ? 'bullish' : 'bearish'}">
                    <div class="token-symbol" style="color: ${p.color}">${p.symbol}</div>
                    <div class="token-price">$${p.price < 1 ? p.price.toFixed(6) : p.price.toLocaleString()}</div>
                    <div class="token-change ${p.change >= 0 ? 'positive' : 'negative'}">
                        ${p.change >= 0 ? '+' : ''}${p.change.toFixed(1)}%
                    </div>
                    <div class="token-note">🎵 ${p.note}</div>
                </div>
            `).join('');
        }

        // 可视化
        function startVisualizer() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            function animate() {
                if (!isPlaying) return;
                ctx.fillStyle = 'rgba(10, 14, 26, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let i = 0; i < 60; i++) {
                    const h = Math.random() * canvas.height * 0.8;
                    const hue = 180 + (i / 60) * 60;
                    ctx.fillStyle = `hsla(${hue}, 80%, 60%, ${Math.random() * 0.5 + 0.3})`;
                    ctx.fillRect(i * (canvas.width / 60), canvas.height - h, (canvas.width / 60) - 2, h);
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        // 事件
        document.getElementById('playBtn').addEventListener('click', startMusic);
        document.getElementById('stopBtn').addEventListener('click', stopMusic);
        
        renderCards();
        
        // 解锁音频
        document.body.addEventListener('click', async () => {
            if (!isInitialized) await Tone.start();
        }, { once: true });
    </script>
</body>
</html>
