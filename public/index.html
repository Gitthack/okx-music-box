<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 DeFi Music Box - OKX OnchainOS Hackathon</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 100%);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d4ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p {
            color: #8892a0;
            font-size: 1.1em;
        }
        .visualizer {
            width: 100%;
            max-width: 800px;
            height: 200px;
            background: rgba(0, 212, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }
        .visualizer canvas {
            width: 100%;
            height: 100%;
        }
        .token-list {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .token-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
        }
        .token-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }
        .token-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .btc { background: rgba(247, 147, 26, 0.2); }
        .eth { background: rgba(98, 126, 234, 0.2); }
        .pepe { background: rgba(0, 255, 136, 0.2); }
        .token-info {
            flex: 1;
        }
        .token-name {
            font-weight: bold;
            font-size: 1.2em;
        }
        .token-price {
            color: #8892a0;
            font-size: 0.9em;
        }
        .token-change {
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 20px;
        }
        .positive { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        .negative { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
        .instrument {
            font-size: 24px;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-play {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }
        .btn-stop {
            background: rgba(255, 71, 87, 0.8);
            color: #fff;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }
        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .mode-btn {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #8892a0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            color: #00d4ff;
        }
        .now-playing {
            text-align: center;
            color: #00d4ff;
            font-size: 1.2em;
            margin-top: 20px;
        }
        .hackathon-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.9em;
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎵 DeFi Music Box</h1>
        <p>市场波动生成音乐 · OKX OnchainOS Hackathon</p>
    </div>

    <div class="mode-selector">
        <button class="mode-btn active" onclick="setMode('symphony')">🎺 市场交响乐</button>
        <button class="mode-btn" onclick="setMode('history')">🎧 我的交易单曲</button>
        <button class="mode-btn" onclick="setMode('dj')">🎛️ DJ打碟</button>
    </div>

    <div class="visualizer">
        <canvas id="visualizer"></canvas>
    </div>

    <div class="token-list">
        <div class="token-item">
            <div class="token-icon btc">₿</div>
            <div class="token-info">
                <div class="token-name">Bitcoin</div>
                <div class="token-price">$67,234.50 → 🎹 低音钢琴</div>
            </div>
            <div class="token-change positive">+2.3%</div>
            <div class="instrument">🎹</div>
        </div>
        <div class="token-item">
            <div class="token-icon eth">Ξ</div>
            <div class="token-info">
                <div class="token-name">Ethereum</div>
                <div class="token-price">$3,456.78 → 🎸 中音吉他</div>
            </div>
            <div class="token-change positive">+5.7%</div>
            <div class="instrument">🎸</div>
        </div>
        <div class="token-item">
            <div class="token-icon pepe">🐸</div>
            <div class="token-info">
                <div class="token-name">PEPE</div>
                <div class="token-price">$0.00001234 → 🎺 高音小号</div>
            </div>
            <div class="token-change positive">+15.2% 🚀</div>
            <div class="instrument">🎺</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-play" onclick="startMusic()">
            ▶️ 播放市场交响乐
        </button>
        <button class="btn btn-stop" onclick="stopMusic()">
            ⏹ 停止
        </button>
    </div>

    <div class="now-playing" id="nowPlaying">
        点击播放，聆听市场的声音...
    </div>

    <div class="hackathon-badge">
        🏆 OKX OnchainOS AI松 | OpenClaw + Kimi K2.5
    </div>

    <script>
        // Simulated market data
        const tokens = [
            { name: 'BTC', price: 67234.50, change: 2.3, instrument: 'piano' },
            { name: 'ETH', price: 3456.78, change: 5.7, instrument: 'guitar' },
            { name: 'PEPE', price: 0.00001234, change: 15.2, instrument: 'trumpet' }
        ];

        let isPlaying = false;
        let synths = {};
        let animationId;

        // Initialize audio context on user interaction
        async function initAudio() {
            await Tone.start();
            
            // Create synths for each token
            synths.btc = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "sine" },
                envelope: { attack: 0.1, decay: 0.3, sustain: 0.5, release: 1 }
            }).toDestination();
            synths.btc.volume.value = -10;

            synths.eth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "triangle" },
                envelope: { attack: 0.05, decay: 0.2, sustain: 0.4, release: 0.8 }
            }).toDestination();
            synths.eth.volume.value = -8;

            synths.pepe = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "sawtooth" },
                envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 0.5 }
            }).toDestination();
            synths.pepe.volume.value = -5;
        }

        // Map price change to note
        function getNoteFromChange(change) {
            const notes = {
                'C2': -10,
                'E2': -7,
                'G2': -5,
                'C3': -3,
                'E3': 0,
                'G3': 3,
                'C4': 5,
                'E4': 7,
                'G4': 10,
                'C5': 15
            };
            
            let closestNote = 'C4';
            let minDiff = Infinity;
            
            for (const [note, threshold] of Object.entries(notes)) {
                const diff = Math.abs(change - threshold);
                if (diff < minDiff) {
                    minDiff = diff;
                    closestNote = note;
                }
            }
            return closestNote;
        }

        // Play market symphony
        async function startMusic() {
            if (isPlaying) return;
            
            await initAudio();
            isPlaying = true;
            
            document.getElementById('nowPlaying').textContent = 
                '🎵 正在演奏：《加密市场狂想曲》...';

            // Play each token's note based on its change
            tokens.forEach((token, index) => {
                const note = getNoteFromChange(token.change);
                const delay = index * 500; // Stagger notes
                
                setTimeout(() => {
                    if (isPlaying) {
                        synths[token.instrument].triggerAttackRelease(note, "2n");
                        highlightToken(index);
                    }
                }, delay);
            });

            // Loop the symphony
            setTimeout(() => {
                if (isPlaying) startMusic();
            }, 4000);

            // Start visualizer
            startVisualizer();
        }

        function stopMusic() {
            isPlaying = false;
            document.getElementById('nowPlaying').textContent = 
                '点击播放，聆听市场的声音...';
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        }

        function highlightToken(index) {
            const items = document.querySelectorAll('.token-item');
            items.forEach((item, i) => {
                if (i === index) {
                    item.style.transform = 'scale(1.02)';
                    item.style.boxShadow = '0 0 30px rgba(0, 212, 255, 0.5)';
                    setTimeout(() => {
                        item.style.transform = 'scale(1)';
                        item.style.boxShadow = 'none';
                    }, 500);
                }
            });
        }

        function setMode(mode) {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const messages = {
                'symphony': '🎺 市场交响乐模式',
                'history': '🎧 生成你的交易单曲',
                'dj': '🎛️ DJ打碟模式'
            };
            document.getElementById('nowPlaying').textContent = messages[mode];
        }

        // Canvas visualizer
        function startVisualizer() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            const bars = 50;
            const barWidth = canvas.width / bars;

            function animate() {
                if (!isPlaying) return;

                ctx.fillStyle = 'rgba(10, 14, 26, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                for (let i = 0; i < bars; i++) {
                    const height = Math.random() * canvas.height * 0.8;
                    const hue = (i / bars) * 60 + 180; // Blue to purple
                    
                    const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - height);
                    gradient.addColorStop(0, `hsla(${hue}, 80%, 50%, 0.8)`);
                    gradient.addColorStop(1, `hsla(${hue}, 80%, 70%, 0.2)`);
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(i * barWidth, canvas.height - height, barWidth - 2, height);
                }

                animationId = requestAnimationFrame(animate);
            }

            animate();
        }

        // Auto-resize canvas
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('visualizer');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        });
    </script>
</body>
</html>
